<h2>登录页：想要哪种风格？</h2>
<p class="subtitle">先聚焦登录页。选一个最接近你期望的方向，我会据此细化。</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简专业</h3>
      <p>大面积留白、精致卡片、柔和阴影、无多余装饰。适合企业/效率工具感。</p>
    </div>
  </div>
  <div class="option" data-choice="branded" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>品牌插画</h3>
      <p>左侧品牌插画/渐变视觉 + 右侧登录表单。色彩鲜明，记忆点强。</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>暗色沉浸</h3>
      <p>深色背景、霓虹点缀、玻璃拟态卡片。科技感强，适合暗色主题优先的产品。</p>
    </div>
  </div>
</div>

<div class="mockup">
  <div class="mockup-header">当前登录页结构</div>
  <div class="mockup-body" style="display:flex;align-items:center;justify-content:center;min-height:160px;background:var(--color-bg-subtle)">
    <div style="width:260px;padding:24px;border:1px solid var(--color-border);border-radius:12px;background:#fff;text-align:center">
      <div style="font-weight:700;margin-bottom:16px">我的每日头条</div>
      <div class="mock-input" style="margin-bottom:8px">用户名</div>
      <div class="mock-input">密码</div>
      <button class="mock-button" style="margin-top:12px;width:100%">登录</button>
    </div>
  </div>
</div>
