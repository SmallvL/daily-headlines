services:
  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: daily-headlines-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-daily_headlines}
      MYSQL_USER: ${MYSQL_USER:-dailyhead}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dailyhead123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: daily-headlines-meilisearch
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: daily-headlines-api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-dailyhead}:${MYSQL_PASSWORD:-dailyhead123}@mysql:3306/${MYSQL_DATABASE:-daily_headlines}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      DEV_ADMIN_USERNAME: ${DEV_ADMIN_USERNAME:-admin}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      SCHEDULER_ENABLED: "true"
      SCHEDULER_INTERVAL_SECONDS: "60"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: daily-headlines-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  meili_data:
